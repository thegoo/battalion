[build-system]
# Setuptools 64+ provides PEP 660 editable installs. The upper bound retains
# compatibility with pip 21's legacy editable-install fallback on Python 3.9.
requires = ["setuptools>=64,<70"]
build-backend = "setuptools.build_meta"

[project]
name = "battalion-cli"
version = "0.3.6"
description = "Configurable deterministic mission classification and assessment"
requires-python = ">=3.9"

[project.scripts]
battalion = "battalion.cli:main"

[tool.setuptools.packages.find]
include = ["battalion*"]

[tool.setuptools.package-data]
battalion = ["default_attributes.yaml"]
